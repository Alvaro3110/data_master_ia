name: SDD Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  sdd-validation:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Validate SDD structure (pull_request)
        if: github.event_name == 'pull_request'
        run: >
          python agentic-analytics/scripts/validate_sdd.py --check-diff
          --diff-range "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

      - name: Validate SDD structure (push)
        if: github.event_name == 'push'
        run: >
          python agentic-analytics/scripts/validate_sdd.py --check-diff
          --diff-range "${{ github.event.before }}..${{ github.sha }}"

      - name: Run SDD tests
        run: pytest -q agentic-analytics/tests/test_sdd_*.py

      - name: Lint markdown
        run: |
          markdownlint \
            agentic-analytics/docs/sdd/*.md \
            agentic-analytics/AGENTS.md \
            .github/copilot-instructions.md
