name: SDD Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  sdd-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Validate SDD structure
        run: python agentic-analytics/scripts/validate_sdd.py --check-diff

      - name: Run SDD tests
        run: pytest -q agentic-analytics/tests/test_sdd_*.py

      - name: Lint markdown
        run: |
          markdownlint \
            agentic-analytics/docs/sdd/*.md \
            agentic-analytics/AGENTS.md \
            .github/copilot-instructions.md
