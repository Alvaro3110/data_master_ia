name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agentic_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          cd agentic-analytics/apps/backend
          $HOME/.local/bin/uv sync
          
      - name: Run Unit Tests (Mocked)
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/agentic_db"
          REDIS_URL: "redis://localhost:6379"
        run: |
          cd agentic-analytics/apps/backend
          $HOME/.local/bin/uv run pytest tests/unit -v -m "not live_openai"
          
  backend-integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agentic_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          cd agentic-analytics/apps/backend
          $HOME/.local/bin/uv sync
          
      - name: Run Integration Tests
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/agentic_db"
          REDIS_URL: "redis://localhost:6379"
        run: |
          cd agentic-analytics/apps/backend
          $HOME/.local/bin/uv run pytest tests/integration -v -m "not live_openai"
          
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          
      - name: Install pnpm
        run: npm install -g pnpm
          
      - name: Install Dependencies
        run: |
          cd agentic-analytics/apps/frontend
          pnpm install
          
      - name: Run Jest Unit Tests
        run: |
          cd agentic-analytics/apps/frontend
          pnpm test -- --watchAll=false
